<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Vallen</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Upright:wght@400;600&family=Alice&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body id="body-bg">

    <div id="countdown-container">
        <h2 id="countdown-title">The surprise starts in...</h2>
        <div class="flip-clock">
            <div class="flip-unit"><span id="days">00</span><label>Days</label></div>
            <div class="flip-unit"><span id="hours">00</span><label>Hours</label></div>
            <div class="flip-unit"><span id="minutes">00</span><label>Min</label></div>
            <div class="flip-unit"><span id="seconds">00</span><label>Sec</label></div>
        </div>
    </div>

    <div id="black-overlay"></div>

    <div id="page">
        <div id="intro-section">
            <div id="gift-icon">🎁</div>
            <p id="hint">It won't open without your touches</p>
        </div>

        <div id="message-section" style="display: none;">
            <div id="text-wrapper">
                <h1 id="text" class="text-hidden"></h1>
            </div>

            <div id="cake-wrapper">
                <div id="cake">🎂</div>
            </div>

            <div id="friends-wishes-container" style="display: none;">
                <div class="wishes-content-wrapper">
                    <h3 class="wish-title">From the People Who Cherish You</h3>
                    <div id="wishes-grid"></div>
                    <button id="nextToIvoryBtn" class="btn-ivory" style="display: inline-block; opacity: 1; position: relative; bottom: 0; margin-top: 20px;">Continue</button>
                </div>
            </div>

            <button id="replayBtn" class="btn-ivory">Start Over</button>
        </div>
    </div>

    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
